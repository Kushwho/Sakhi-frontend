<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6d40e7",
                        "sakhi-purple": "#6B3FE7",
                        "background-light": "#f6f6f8",
                        "background-dark": "#151121",
                    },
                    fontFamily: {
                        "display": ["Nunito", "sans-serif"],
                        "body": ["Nunito", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .sky-gradient {
            background: linear-gradient(180deg, #C8E8F5 0%, #EEF7FC 100%);
        }
        .sakhi-gradient {
            background: radial-gradient(circle at 30% 30%, #FFBE8A 0%, #F4845F 100%);
        }
        .soft-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .button-glow {
            box-shadow: 0 0 20px rgba(109, 64, 231, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
